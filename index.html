<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxorion Digital</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0f2c, #000);
    color:white;
}

/* CONTAINER */
.container {
    max-width:1200px;
    margin:auto;
    padding:40px;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img {
    height:50px;
}

.lang span {
    cursor:pointer;
    margin-left:10px;
}

/* HERO */
.hero {
    text-align:center;
    margin-top:80px;
}

.hero img {
    width:260px;
    margin-bottom:30px;
    filter: drop-shadow(0 0 20px #00d4ff);
}

h1 {
    font-size:42px;
}

p {
    color:#aaa;
    max-width:600px;
    margin:auto;
    margin-top:20px;
}

.btn {
    margin-top:30px;
    padding:15px 40px;
    background:linear-gradient(90deg,#00d4ff,#0066ff);
    border:none;
    color:white;
    cursor:pointer;
    font-size:16px;
    border-radius:8px;
}

/* FEATURES */
.features {
    margin-top:100px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.card {
    background:#111933;
    padding:30px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px);
    box-shadow:0 0 20px #00d4ff44;
}

/* FOOTER */
footer {
    margin-top:120px;
    text-align:center;
    color:#666;
}

/* ARABIC */
.ar {
    direction:rtl;
    text-align:right;
}
</style>

</head>

<body>

<div class="container">

<header>
<div class="logo">
<img src="logo.png">
</div>

<div class="lang">
<span onclick="setLang('en')">EN</span>
<span onclick="setLang('ru')">RU</span>
<span onclick="setLang('ar')">AR</span>
</div>
</header>

<div class="hero">

<img src="logo.png">

<h1 id="title"></h1>
<p id="desc"></p>

<button class="btn">Get Clients</button>

</div>

<div class="features">

<div class="card" id="f1"></div>
<div class="card" id="f2"></div>
<div class="card" id="f3"></div>

</div>

<footer>
© Luxorion Digital
</footer>

</div>

<script>

const content = {

en:{
title:"We build AI systems that bring you clients automatically",
desc:"Websites, automation and AI systems that work instead of you and generate real revenue.",
f1:"AI Automation",
f2:"Premium Websites",
f3:"Client Acquisition Systems"
},

ru:{
title:"Мы создаем AI системы, которые приводят клиентов автоматически",
desc:"Сайты, автоматизация и AI системы, которые работают за вас и приносят прибыль.",
f1:"AI Автоматизация",
f2:"Премиум сайты",
f3:"Системы привлечения клиентов"
},

ar:{
title:"نقوم بإنشاء أنظمة ذكاء اصطناعي تجلب لك العملاء تلقائيًا",
desc:"مواقع وأنظمة ذكاء اصطناعي تعمل بدلاً منك وتحقق أرباحًا حقيقية.",
f1:"أتمتة الذكاء الاصطناعي",
f2:"مواقع احترافية",
f3:"أنظمة جذب العملاء"
}

};

function setLang(lang){

document.getElementById("title").innerText = content[lang].title;
document.getElementById("desc").innerText = content[lang].desc;

document.getElementById("f1").innerText = content[lang].f1;
document.getElementById("f2").innerText = content[lang].f2;
document.getElementById("f3").innerText = content[lang].f3;

if(lang === "ar"){
document.body.classList.add("ar");
}else{
document.body.classList.remove("ar");
}

}

setLang("en");

</script>

</body>
</html>
